[global/wm]

margin-bottom = 0
margin-top = 0

include-file = ../../src/config/system.ini
include-file = modules.ini


[color]


dark = #1A1B26
light= #9F9F9F
red = #be5046
pink = #dc5bbc
purple = #7560d3
blue = #4889be
cyan = #49919a
teal = #00B19F
green = #81ae5f
lime = #B9C244
yellow = #d19a66
amber = #fac33b
orange = #de8658
brown = #AC8476
grey = #8C8C8C
indigo = #6C77BB
blue-gray = #6D8895

bg = #aa1A1B26
bg-alt = #708491
fg = #abb2bf

bg-bar = "${color.bg}"
fg-bar = "${color.light}"

accent = "${color.cyan}"
fg-focused = "${color.dark}"
bg-focused = "${color.cyan}"
fg-unfocused = "${color.light}"
bg-unfocused = "${color.dark}"
underline-occupied = "${color.bg-focused}"

pad=2

[bar/isa-bar]
monitor = ${env:MONITOR:}
monitor-strict = false
override-redirect = false

bottom = false
fixed-center = true

width = 100%
height = 30

offset-x = 0
offset-y = 0

background = ${color.bg-bar}
foreground = ${color.fg-bar}

radius = 0

line-size = 2
line-color = ${color.blue}

border-size = 0
border-color = ${color.bg}

padding-left = 0
padding-right = 0

module-margin-left = 0
module-margin-right = 0.5

font-0 = "FiraCode Nerd Font:size=11;2"
font-1 = "Material Design Icons Desktop:size=16;4"
font-2 = "Material Design Icons Desktop:size=12;3"
font-3 = "Font Awesome 6 Free Solid:size=10;3"

;Modules availables but not active:
;	brightness		xkeyboard
modules-left = bspwm sep2 title sep
modules-center = date 
modules-right = pulseaudio sep2 filesystem sep2 cpu_bar sep temperature sep2 memory_bar sep2 tray sep sep

separator =
dim-value = 1.0
;locale = es_MX.UTF-8

wm-restack = bspwm
enable-ipc = true

cursor-click = pointer
cursor-scroll =

[settings]

screenchange-reload = false

compositing-background = source
compositing-foreground = over
compositing-overline = over
compositing-underline = over
compositing-border = over

pseudo-transparency = true
